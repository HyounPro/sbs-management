<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 — SBS아카데미안산</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body>

  <!-- 로그인 -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-box">
      <div class="login-title">관리자 로그인</div>
      <div class="login-sub">SBS아카데미안산 개강안내 관리 페이지</div>
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="이메일 입력">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input class="form-input" type="password" id="loginPw" placeholder="비밀번호 입력">
      </div>
      <div class="error-msg" id="loginError"></div>
      <button class="btn btn-primary" style="width:100%;padding:12px;font-size:15px;margin-top:8px;" id="loginBtn">로그인</button>
    </div>
  </div>

  <!-- 관리자 메인 -->
  <div style="display:none;" id="adminWrap">
    <header class="header">
      <div class="header-top">
        <div class="logo">관리자 페이지</div>
        <div style="display:flex;gap:8px;">
          <a href="index.html" class="btn btn-outline" style="text-decoration:none;">공개 페이지</a>
          <button class="btn btn-outline" id="logoutBtn">로그아웃</button>
        </div>
      </div>
    </header>

    <div class="admin-wrap">

      <!-- 엑셀 업로드 -->
      <div class="section">
        <div class="section-title">엑셀 시간표 업로드</div>
        <div class="upload-area" id="uploadArea">
          <div class="upload-icon">📂</div>
          <div class="upload-text">파일을 드래그하거나 <span>클릭하여 선택</span>하세요</div>
          <div class="upload-text" style="margin-top:6px;font-size:12px;">.xlsx 파일만 지원 (평일/주말 파일명 구분 필요)</div>
        </div>
        <input type="file" id="fileInput" accept=".xlsx" multiple style="display:none;">
        <div class="file-list" id="fileList"></div>
        <button class="process-btn" id="processBtn" disabled>✨ 개강안내 자동 생성</button>
      </div>

      <!-- 처리 로그 -->
      <div class="section">
        <div class="section-title">처리 로그</div>
        <div class="log-box" id="logBox"><span style="color:#555;">대기 중...</span></div>
      </div>

      <!-- 개강안내 양식 편집 -->
      <div class="section">
        <div class="section-title">개강안내 양식 편집</div>
        <div style="font-size:12px;color:#888;margin-bottom:12px;">
          사용 가능한 변수:
          <code style="background:#222;padding:2px 6px;border-radius:4px;margin:2px;">{subject}</code>
          <code style="background:#222;padding:2px 6px;border-radius:4px;margin:2px;">{days}</code>
          <code style="background:#222;padding:2px 6px;border-radius:4px;margin:2px;">{start_date}</code>
          <code style="background:#222;padding:2px 6px;border-radius:4px;margin:2px;">{end_date}</code>
          <code style="background:#222;padding:2px 6px;border-radius:4px;margin:2px;">{start_time}</code>
          <code style="background:#222;padding:2px 6px;border-radius:4px;margin:2px;">{end_time}</code>
          <code style="background:#222;padding:2px 6px;border-radius:4px;margin:2px;">{room}</code>
          <code style="background:#222;padding:2px 6px;border-radius:4px;margin:2px;">{discord_link}</code>
          <code style="background:#222;padding:2px 6px;border-radius:4px;margin:2px;">{face_to_face}</code>
          <code style="background:#222;padding:2px 6px;border-radius:4px;margin:2px;">{notes}</code>
        </div>
        <textarea id="templateEditor" style="width:100%;height:320px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:16px;color:#f0f0f0;font-size:13px;font-family:monospace;line-height:1.8;resize:vertical;outline:none;"></textarea>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button class="btn btn-primary" style="flex:1;" id="saveTemplateBtn">저장</button>
          <button class="btn btn-outline" id="resetTemplateBtn">기본값으로 초기화</button>
        </div>
        <div id="templateMsg" style="font-size:13px;margin-top:8px;min-height:18px;"></div>
      </div>

      <!-- 현재 데이터 현황 -->
      <div class="section">
        <div class="section-title">현재 등록된 개강안내</div>
        <div id="statsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;"></div>
        <button class="btn btn-outline" style="margin-top:16px;width:100%;" id="clearDataBtn">전체 데이터 초기화</button>
      </div>

    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
